services:
  traefik:
    image: traefik:latest
    container_name: traefik
    env_file:
      - .shared.env
      - .secrets.env
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false

      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=https
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true

      - --entrypoints.https.address=:443
      - --entrypoints.https.http.tls=true
      - --entrypoints.https.http.tls.certresolver=letsencrypt

      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=${SECRET_EMAIL?error}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.disablepropagationcheck=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`traefik.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.routers.api.service=api@internal
      - traefik.http.services.api.loadbalancer.server.port=8080
    restart: unless-stopped

  dummy: # dummy container to get a wildcard certificate for the domain
    image: "traefik/whoami"
    container_name: "dummy"
    labels:
      - traefik.enable=true"
      - traefik.http.routers.api.tls.domains[0].main=${SECRET_DOMAIN?error}
      - traefik.http.routers.api.tls.domains[0].sans=*.${SECRET_DOMAIN?error}
      - traefik.http.routers.api.tls.certResolver=letsencrypt

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    env_file:
      - .secrets.env
    ports:
      - 3000:3000
    volumes:
      - ./apps/homepage/logs:/app/config/logs
      - ./homepage/bookmarks.yaml:/app/config/bookmarks.yaml:ro
      - ./homepage/docker.yaml:/app/config/docker.yaml:ro
      - ./homepage/services.yaml:/app/config/services.yaml:ro
      - ./homepage/settings.yaml:/app/config/settings.yaml:ro
      - ./homepage/widgets.yaml:/app/config/widgets.yaml:ro
      - /mnt/seagate:/mnt/seagate:ro
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`homepage.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.homepage.entrypoints=https       
      - traefik.http.routers.homepage.tls.certresolver=letsencrypt
    restart: unless-stopped

  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    env_file:
      - .shared.env
      - .secrets.env
    volumes:
      - ./ddclient:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=9090
    env_file:
      - .shared.env
    volumes:
      - ./apps/qbittorrent:/config
      - /mnt/seagate:/seagate
      - /home/dani/Downloads:/watch
    ports:
      - 6881:6881
      - 6881:6881/udp
    labels:
      - traefik.enable=true
      - traefik.http.routers.torrent.rule=Host(`torrent.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.torrent.entrypoints=https
      - traefik.http.routers.torrent.tls.certresolver=letsencrypt
      - traefik.http.routers.torrent.service=torrent
      - traefik.http.services.torrent.loadbalancer.server.port=9090
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    env_file:
      - .shared.env
    volumes:
      - ./apps/jackett:/config
      - /home/dani/Downloads:/seagate/downloads
    ports:
      - 9117:9117
    labels:
      - traefik.enable=true
      - traefik.http.routers.jackett.rule=Host(`jackett.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.jackett.entrypoints=https
      - traefik.http.routers.jackett.tls.certresolver=letsencrypt
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    env_file:
      - .shared.env
    volumes:
      - ./apps/sonarr:/config
      - /mnt/seagate:/seagate
    ports:
      - 8989:8989
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.sonarr.entrypoints=https
      - traefik.http.routers.sonarr.tls.certresolver=letsencrypt
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    env_file:
      - .shared.env
    volumes:
      - ./apps/radarr:/config
      - /mnt/seagate:/seagate
    ports:
      - 7878:7878
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.radarr.entrypoints=https
      - traefik.http.routers.radarr.tls.certresolver=letsencrypt
    restart: unless-stopped

  unpackerr:
    image: golift/unpackerr
    container_name: unpackerr
    volumes:
      - /mnt/seagate:/seagate
      - ./unpackerr:/config
    environment:
      - UN_LOG_FILE=/seagate/downloads/unpackerr.log
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_WEBSERVER_METRICS=true
    env_file:
      - .shared.env
      - .secrets.env
    ports:
      - 5656:5656

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
    ports:
      - 5055:5055
    volumes:
      - ./apps/jellyseerr:/app/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.jellyseerr.entrypoints=https
      - traefik.http.routers.jellyseerr.tls.certresolver=letsencrypt
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    env_file:
      - .shared.env
    volumes:
      - ./apps/jellyfin:/config
      - /mnt/seagate/media/sonarr:/data/tvshows
      - /mnt/seagate/media/radarr:/data/movies
      - /mnt/seagate/media/Bellesa:/data/bellesa
      - /mnt/seagate/media/readarr:/data/books
      - ./letsencrypt:/cert
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 8096:8096
      - 7359:7359/udp # discovery
      - 1900:1900/udp # announce
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.jellyfin.entrypoints=https
      - traefik.http.routers.jellyfin.tls.certresolver=letsencrypt
      - traefik.http.routers.jellyfin.service=jellyfin
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    restart: unless-stopped

  tinfoil:
    image: nginx:alpine
    container_name: tinfoil
    volumes:
      - /mnt/seagate/tinfoil:/usr/share/nginx/html/:ro
      - ./tinfoil:/etc/nginx:ro
    ports:
      - 9000:9000
    labels:
      - traefik.enable=true
      - traefik.http.routers.tinfoil.rule=Host(`tinfoil.${SECRET_DOMAIN?error}`)
      - traefik.http.routers.tinfoil.entrypoints=https
      - traefik.http.routers.tinfoil.tls.certresolver=letsencrypt
      - traefik.http.routers.tinfoil.service=tinfoil
      - traefik.http.services.tinfoil.loadbalancer.server.port=9000
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    environment:
      - WATCHTOWER_SCHEDULE=0 4 * * *
    env_file:
      - .shared.env
      - .secrets.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # ports:
      #   - 8080:8080
    command: --cleanup --http-api-metrics --http-api-token ${SECRET_WATCHTOWER_KEY?error}
    restart: unless-stopped

